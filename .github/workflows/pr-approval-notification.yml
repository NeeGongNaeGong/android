name: PR Approval Notification
on:
  pull_request_review:
    types: [submitted]
# 명시적 권한 설정
permissions:
  contents: read
  pull-requests: read
jobs:
  check-approvals:
    runs-on: ubuntu-latest
    # 현재 리뷰가 승인(APPROVED) 일 때만 작업 실행
    if: github.event.review.state == 'APPROVED'
    steps:
      - name: Get PR approvals and author
        id: get-pr-info
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            const { owner, repo, number } = context.issue;
            
            // PR 정보 가져오기 (작성자 포함)
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number
            });
            
            const prAuthor = pr.data.user.login;
            console.log(`PR 작성자: ${prAuthor}`);
            
            // 리뷰 정보 가져오기
            const reviews = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: number
            });
            
            // 고유한 승인자 목록 만들기
            const approvers = new Set();
            reviews.data.forEach(review => {
              // 가장 최근 리뷰만 고려하기 위한 맵
              if (review.state === 'APPROVED') {
                approvers.add(review.user.login);
              }
            });
            
            // 승인자 수 확인
            const approvalCount = approvers.size;
            console.log(`승인자 수: ${approvalCount}`);
            
            // 승인자 목록을 출력
            const approversList = Array.from(approvers).join(', ');
            console.log(`승인자 목록: ${approversList}`);
            
            // 정확히 1명이 승인했고, 그 승인이 방금 1개가 되었는지 확인
            const exactlyTwoApprovals = approvalCount === 1;
            
            return { 
              count: approvalCount, 
              users: approversList,
              exactly_two: exactlyTwoApprovals,
              author: prAuthor
            };
            
      - name: Get author email
        id: get-author-email
        if: ${{ fromJSON(steps.get-pr-info.outputs.result).exactly_two }}
        run: |
          AUTHOR="${{ fromJSON(steps.get-pr-info.outputs.result).author }}"
          # 줄바꿈이 포함된 JSON을 처리하기 위한 코드
          EMAIL_MAPPING='${{ secrets.AUTHOR_EMAIL_MAPPING }}'
          # jq는 자동으로 여러 줄 JSON을 처리할 수 있음
          AUTHOR_EMAIL=$(echo "$EMAIL_MAPPING" | jq -r --raw-input --slurp 'fromjson | .["'"$AUTHOR"'"]')
          echo "email=$AUTHOR_EMAIL" >> $GITHUB_OUTPUT
      
      - name: Send email notification to mapped author email
        if: ${{ fromJSON(steps.get-pr-info.outputs.result).exactly_two }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[APPROVED✅] PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          body: |
            ${{ fromJSON(steps.get-pr-info.outputs.result).author }}님의 Pull Request #${{ github.event.pull_request.number }} "${{ github.event.pull_request.title }}"가 1명의 승인을 받았습니다.
            
            승인자 목록: ${{ fromJSON(steps.get-pr-info.outputs.result).users }}
            
            PR 링크: ${{ github.event.pull_request.html_url }}
          to: ${{ steps.get-author-email.outputs.email }}
          from: GitHub Actions
