name: Build Android Debug APK

on:
  push:
    branches:
      - feat/#77-cicd-github-actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 🔧 local.properties 생성 (sdk.dir + 커스텀 값 포함)
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "${{ secrets.LOCAL_PROPERTIES }}" >> local.properties

      # 🔐 google-services.json 복원
      - name: Create google-services.json
        uses: jsdaniell/create-json@v1.2.2
        with:
          name: google-services.json
          json: ${{ secrets.GOOGLE_SERVICE_JSON }}

      - name: Move google-services.json to app directory
        run: mv google-services.json app/google-services.json

      # 🔐 strings.xml 동적 생성
      - name: Create strings.xml with secrets
        run: |
          mkdir -p app/src/main/res/values
          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">NeeGongNaeGong</string>
              <string name="google_web_client_id">${{ secrets.GOOGLE_CLIENT_ID }}</string>
          </resources>
          EOF

      # ⚙️ Gradle build
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 📦 APK 업로드
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
