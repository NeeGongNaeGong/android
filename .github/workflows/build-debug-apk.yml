name: Build Android Debug APK

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🚀 Gradle 캐시 설정 (속도 개선)
      - name: Cache Gradle files
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 🔧 local.properties 생성
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "BASE_URL=\"${{ secrets.BASE_URL }}\"" >> local.properties
          echo "GOOGLE_CLIENT_ID=\"${{ secrets.GOOGLE_CLIENT_ID }}\"" >> local.properties


      # 🔐 google-services.json 복원
      - name: Create google-services.json
        uses: jsdaniell/create-json@v1.2.2
        with:
          name: google-services.json
          json: ${{ secrets.GOOGLE_SERVICE_JSON }}

      - name: Move google-services.json to app directory
        run: mv google-services.json app/google-services.json

      # ⚙️ Gradle 빌드
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 📦 APK 업로드
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
