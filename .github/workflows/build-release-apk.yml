# 워크플로우의 전체 이름을 지정합니다. GitHub Actions 탭에 이 이름이 표시됩니다.
name: CI and Build on Release Branch (Java 11)

# 'on'은 이 워크플로우가 언제 실행될지를 정의하는 트리거(trigger)입니다.
on:
  # 'push' 이벤트가 발생했을 때 실행됩니다.
  push:
    # 여러 브랜치 중 'main' 브랜치에만 반응하도록 한정합니다.
    branches: [ main ]

# 'jobs'는 워크플로우에서 실행될 하나 이상의 작업 단위를 포함합니다.
jobs:
  # 'test-and-build' 라는 이름의 작업을 정의합니다.
  build:
    # 이 작업을 실행할 가상 머신의 종류를 지정합니다.
    runs-on: ubuntu-latest

    # 'steps'는 작업 안에서 순차적으로 실행될 단계들의 목록입니다.
    steps:
      # 1. 소스 코드 내려받기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 11 설정
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          # Java 버전을 '11'로 지정합니다.
          java-version: '11'
          distribution: 'temurin'

      # 3. Gradle 캐싱 (빌드 속도 향상)
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. gradlew 파일에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 5. 서명 키스토어 파일 생성
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/neegongnaegong-release.jks
      
      # 6. 로컬 프로퍼티 설정
      - name: Create local.properties
        run: |
          echo "STORE_FILE=neegongnaegong-release.jks" >> local.properties
          echo "STORE_PASSWORD=${{ secrets.MY_STORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.MY_RELEASE_KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.MY_RELEASE_KEY_PASSWORD }}" >> local.properties
          echo "BASE_URL=${{ secrets.MY_BASE_URL }}" >> local.properties
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> local.properties
          echo "DEEP_LINK_HOST=${{ secrets.DEEP_LINK_HOST }}" >> local.properties

      # 7. 릴리즈 APK 빌드
      - name: Build release APK
        run: ./gradlew assembleRelease
      
      # 8. APK 파일을 아티팩트로 업로드
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
